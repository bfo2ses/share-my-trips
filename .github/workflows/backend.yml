name: Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Build
        working-directory: backend
        run: go build ./...
